
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>外贸网盘资源导航站</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1 class="site-title">外贸网盘资源导航站</h1>
            <p class="site-description">外贸学习、创业、工具资源网盘合集，支持层级分类与关键词搜索</p>
            <input type="text" class="search-box" id="search-box" placeholder="搜索分类、文件名...">
        </div>
    </header>
    <div class="container">
        <aside class="sidebar">
            <h2 class="nav-title">层级分类导航</h2>
            <div id="category-nav"></div>
        </aside>
        <main class="content">
            <div class="content-header">
                <h2 class="content-title" id="content-title">全部资源</h2>
                <p class="resource-count" id="resource-count">共 0 个资源</p>
            </div>
            <div id="resource-list" class="resource-list"></div>
        </main>
    </div>
    <script src="assets/script.js"></script>
</body>
</html>
